

version: "1.0"

domains:

  customers:
    primary_key: customer_id
    columns:
      customer_id:  {type: integer,  nullable: false, unique: true}
      age:          {type: integer,  nullable: false, min: 18, max: 99}
      email:        {type: string,   nullable: false, format: email}
      country:      {type: string,   nullable: false}
      signup_date:  {type: date,     nullable: false}
    baselines:
      null_rate_max: 0.01
      row_count_min: 1000

  accounts:
    primary_key: account_id
    foreign_keys:
      customer_id: customers.customer_id
    columns:
      account_id:   {type: integer,  nullable: false, unique: true}
      customer_id:  {type: integer,  nullable: false}
      account_type: {type: string,   nullable: false, allowed: [checking, savings, credit]}
      balance:      {type: float,    nullable: false}
      opened_date:  {type: date,     nullable: false}
    baselines:
      null_rate_max: 0.01
      balance_mean_min: 0.0

  transactions:
    primary_key: transaction_id
    foreign_keys:
      account_id: accounts.account_id
    columns:
      transaction_id:   {type: integer, nullable: false, unique: true}
      account_id:       {type: integer, nullable: false}
      amount:           {type: float,   nullable: false}
      transaction_date: {type: date,    nullable: false}
      category:         {type: string,  nullable: false}
    baselines:
      null_rate_max: 0.02
      amount_mean_min: 1.0
      amount_mean_max: 10000.0
